<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 420px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        .btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: white;
            color: #764ba2;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #764ba2;
            color: white;
        }

        .email-display {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>📩 ติดต่อสอบถาม</h2>

        <div class="email-display">
            อีเมลติดต่อ: <strong>onotza93@gmail.com</strong>
        </div>

        <form>
            <div class="input-group">
                <label>ชื่อ</label>
                <input type="text" placeholder="กรอกชื่อของคุณ">
            </div>

            <div class="input-group">
                <label>อีเมล</label>
                <input type="email" placeholder="example@email.com">
            </div>

            <div class="input-group">
                <label>เบอร์โทร</label>
                <input type="tel" placeholder="08xxxxxxxx">
            </div>

            <div class="input-group">
                <label>ข้อความ</label>
                <textarea placeholder="พิมพ์ข้อความของคุณ..."></textarea>
            </div>

            <button type="submit" class="btn">ส่งข้อมูล</button>
        </form>
    </div>

</body>
</html>
