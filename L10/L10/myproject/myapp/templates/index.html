{% block content %}

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<h2 class="text-center text-primary my-4">
    ยินดีต้อนรับเข้าสู่เว็บไซต์ของรายวิชา ICT12367
</h2>

<div class="container">

    <table class="table table-hover text-center shadow">
        <thead class="table-dark">
            <tr>
                <th>รหัสประชากร</th>
                <th>ชื่อประชากร</th>
                <th>อายุ</th>
                <th>จัดการ</th>
            </tr>
        </thead>

        <tbody>
            {% for person in all_person %}
            <tr>
                <td>{{ person.id }}</td>
                <td>{{ person.name }}</td>
                <td>{{ person.age }}</td>

                <td>
                    <!-- ปุ่มแก้ไข -->
                    <a href="#" class="btn me-2"
                       style="background-color:#FF69B4; color:white;">
                        แก้ไข
                    </a>

                    <!-- ปุ่มลบ -->
                    <a href="#" class="btn"
                       style="background-color:#FF8C00; color:white;">
                        ลบ
                    </a>
                </td>
            </tr>

            {% empty %}
            <tr>
                <td colspan="4" class="text-center text-muted py-4">
                    ยังไม่มีข้อมูลประชากรในระบบ
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
